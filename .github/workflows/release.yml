name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-build

      - name: Build release binary
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "rl_uploader-$tag-x86_64-pc-windows-msvc.tar.gz"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path staging -Force | Out-Null
          Copy-Item target\release\rl_uploader.exe staging\
          Copy-Item .env.example staging\
          # tar.gz keeps self_update on the well-trodden tar+flate2 path and
          # avoids zip crate quirks (Deflate64 / NTFS extras / Zip64 records).
          tar -czvf "dist\$asset" -C staging rl_uploader.exe .env.example
          Write-Host "Created: dist\$asset"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
