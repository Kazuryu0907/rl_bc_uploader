name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "rl_uploader-$tag-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          # Use 7z (standard Deflate) instead of Compress-Archive — the latter
          # emits Zip64 / Deflate64 records that the `zip` crate used by
          # self_update can't read.
          & 7z a -tzip -mm=Deflate "dist\$asset" "target\release\rl_uploader.exe" ".env.example"
          Write-Host "Created: dist\$asset"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
